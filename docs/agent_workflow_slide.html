<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>GeotechStaffEngineer — Agent Workflow</title>
<style>
  body { margin:0; background:#222; display:flex; justify-content:center; align-items:center; min-height:100vh; }
  .slide { width:1280px; height:720px; background:#fcfdfe; font-family:"Segoe UI",system-ui,sans-serif; position:relative; overflow:hidden; box-shadow:0 4px 30px rgba(0,0,0,.5); }
  svg { position:absolute; inset:0; }
  text { font-family:"Segoe UI",system-ui,sans-serif; }
  .title { font-size:25px; font-weight:700; fill:#16324a; }
  .subtitle { font-size:13.5px; fill:#5d6b7a; }
  .boxtitle { font-size:15px; font-weight:700; fill:#16324a; }
  .boxsub { font-size:11.5px; fill:#48586a; }
  .small { font-size:10.5px; fill:#5d6b7a; }
  .tooltxt { font-size:11.5px; font-weight:600; fill:#0e5e7e; }
  .modtxt { font-size:10px; fill:#3d4c5c; }
  .lbl { font-size:10.5px; font-weight:600; fill:#7a4a00; }
</style>
</head>
<body>
<div class="slide">
<svg viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#5d6b7a"/>
    </marker>
    <marker id="arrB" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#0e6e8e"/>
    </marker>
    <marker id="arrG" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#1a7f4b"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="40" y="44" class="title">GeotechStaffEngineer — LLM agent workflow</text>
  <text x="40" y="66" class="subtitle">One orchestrating agent &middot; four discovery/execution tools &middot; 30 validated analysis modules &middot; a reference &amp; review sub-agent</text>

  <!-- ============ USER ============ -->
  <rect x="40" y="130" width="170" height="90" rx="10" fill="#eef6f9" stroke="#0e6e8e" stroke-width="2"/>
  <text x="125" y="162" text-anchor="middle" class="boxtitle">Engineer</text>
  <text x="125" y="183" text-anchor="middle" class="boxsub">chat / Databricks notebook</text>
  <text x="125" y="200" text-anchor="middle" class="boxsub">question &middot; data files</text>

  <!-- ============ MAIN AGENT ============ -->
  <rect x="300" y="110" width="300" height="170" rx="12" fill="#ffffff" stroke="#16324a" stroke-width="2.5"/>
  <text x="450" y="138" text-anchor="middle" class="boxtitle">Main agent (deepagents loop)</text>
  <text x="450" y="157" text-anchor="middle" class="boxsub">frontier LLM via LangChain (Funhouse GPT / Claude)</text>
  <line x1="316" y1="168" x2="584" y2="168" stroke="#dde4ec"/>
  <text x="316" y="186" class="small">middleware: planning (to-dos) &middot; cross-session memory</text>
  <text x="316" y="202" class="small">conversation summarization &middot; per-tool result budgets</text>
  <text x="316" y="218" class="small">("search narrower" truncation nudges)</text>
  <text x="316" y="240" class="small" font-style="italic">discovers capability &rarr; plans &rarr; calls tools &rarr;</text>
  <text x="316" y="256" class="small" font-style="italic">delegates lookups &amp; review &rarr; assembles cited answer</text>

  <!-- user <-> agent arrows -->
  <line x1="210" y1="158" x2="296" y2="158" stroke="#5d6b7a" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="296" y1="198" x2="210" y2="198" stroke="#5d6b7a" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="253" y="150" text-anchor="middle" class="small">ask</text>
  <text x="253" y="214" text-anchor="middle" class="small">answer + calc package</text>

  <!-- ============ TOOLS ============ -->
  <rect x="300" y="320" width="300" height="120" rx="10" fill="#f1f6fa" stroke="#0e6e8e" stroke-width="1.8"/>
  <text x="450" y="345" text-anchor="middle" class="boxtitle" fill="#0e5e7e">Tools</text>
  <text x="316" y="367" class="tooltxt">list_agents</text>
  <text x="316" y="385" class="tooltxt">list_methods</text>
  <text x="460" y="367" class="tooltxt">describe_method</text>
  <text x="460" y="385" class="tooltxt">call_agent</text>
  <text x="316" y="407" class="small">catalog &rarr; method docs (allowed values) &rarr; validated run;</text>
  <text x="316" y="423" class="small">+ vision tools for reference figures &amp; plots</text>

  <line x1="450" y1="280" x2="450" y2="316" stroke="#0e6e8e" stroke-width="2" marker-end="url(#arrB)"/>

  <!-- ============ MODULES ============ -->
  <rect x="300" y="480" width="300" height="200" rx="10" fill="#ffffff" stroke="#9fb4c4" stroke-width="1.6"/>
  <text x="450" y="505" text-anchor="middle" class="boxtitle">30 validated analysis modules</text>
  <text x="316" y="527" class="modtxt">bearing capacity &middot; settlement &middot; axial pile &middot; drilled shaft</text>
  <text x="316" y="542" class="modtxt">lateral pile &middot; pile group &middot; wave equation &middot; downdrag</text>
  <text x="316" y="557" class="modtxt">sheet pile &middot; SOE &middot; retaining walls/MSE &middot; ground improvement</text>
  <text x="316" y="572" class="modtxt"><tspan font-weight="700">slope stability (GLE/M-P)</tspan> &middot; <tspan font-weight="700">FEM 2D (T6, strength reduction)</tspan></text>
  <text x="316" y="587" class="modtxt"><tspan font-weight="700">reliability (FOSM &middot; PEM &middot; Monte Carlo &middot; FORM)</tspan> &middot; seismic</text>
  <text x="316" y="602" class="modtxt">liquefaction &middot; site response &middot; subsurface characterization</text>
  <text x="316" y="617" class="modtxt">geostatistics &middot; sensitivity &middot; DXF/PDF import &middot; &hellip;</text>
  <line x1="316" y1="630" x2="584" y2="630" stroke="#dde4ec"/>
  <text x="316" y="649" class="small">every result renders to an engineer-reviewable</text>
  <text x="316" y="664" class="small"><tspan font-weight="700">calc package</tspan> (HTML/PDF: equations, tables, figures)</text>

  <line x1="450" y1="440" x2="450" y2="476" stroke="#0e6e8e" stroke-width="2" marker-end="url(#arrB)"/>

  <!-- ============ SUBAGENT: REFERENCES & REVIEW ============ -->
  <rect x="680" y="130" width="280" height="290" rx="10" fill="#f3f9f4" stroke="#1a7f4b" stroke-width="2.4"/>
  <text x="820" y="158" text-anchor="middle" class="boxtitle" fill="#155c39">Reference &amp; review sub-agent</text>
  <line x1="696" y1="170" x2="944" y2="170" stroke="#cfe4d6"/>

  <text x="696" y="192" class="small" font-weight="700" fill="#155c39">As librarian:</text>
  <text x="696" y="208" class="small">searches 20 ingested design manuals</text>
  <text x="696" y="223" class="small">(DM7, GEC 4&ndash;14, UFC, micropile&hellip;) via a</text>
  <text x="696" y="238" class="small">full-text index + synonym expansion;</text>
  <text x="696" y="253" class="small">reads values off figures/charts; returns</text>
  <text x="696" y="268" class="small"><tspan font-weight="700">cited</tspan> passages (section / table / equation)</text>

  <text x="696" y="294" class="small" font-weight="700" fill="#155c39">As reviewer:</text>
  <text x="696" y="310" class="small">independent QC pass on the draft answer —</text>
  <text x="696" y="325" class="small">verifies citations point where claimed,</text>
  <text x="696" y="340" class="small">checks values against the manuals, flags</text>
  <text x="696" y="355" class="small">unsupported claims &amp; method applicability</text>
  <text x="696" y="375" class="lbl" fill="#155c39">checks work — never recomputes or authors</text>
  <text x="696" y="400" class="lbl" fill="#155c39">budgeted: hard cap on internal rounds</text>

  <!-- agent <-> subagent arrows -->
  <line x1="600" y1="180" x2="676" y2="180" stroke="#1a7f4b" stroke-width="2" marker-end="url(#arrG)"/>
  <line x1="676" y1="220" x2="600" y2="220" stroke="#1a7f4b" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="638" y="172" text-anchor="middle" class="small">consult</text>
  <text x="638" y="236" text-anchor="middle" class="small">cited findings</text>

  <!-- ============ REFERENCE LIBRARY ============ -->
  <rect x="1020" y="130" width="220" height="290" rx="10" fill="#ffffff" stroke="#9fb4c4" stroke-width="1.4"/>
  <text x="1130" y="158" text-anchor="middle" class="boxtitle">Reference library</text>
  <line x1="1036" y1="170" x2="1224" y2="170" stroke="#dde4ec"/>
  <text x="1036" y="192" class="small">20 design manuals ingested</text>
  <text x="1036" y="208" class="small">1,900 indexed sections</text>
  <text x="1036" y="224" class="small">figure catalogs + curated</text>
  <text x="1036" y="239" class="small">lookup functions</text>
  <text x="1036" y="262" class="small">scheduled QC re-checks the</text>
  <text x="1036" y="277" class="small">data against the source PDFs</text>
  <text x="1036" y="300" class="small">synonym query expansion:</text>
  <text x="1036" y="315" class="small">+33 points retrieval recall</text>
  <line x1="960" y1="250" x2="1016" y2="250" stroke="#1a7f4b" stroke-width="1.8" marker-end="url(#arrG)"/>

  <!-- ============ WHY TRUST IT ============ -->
  <rect x="680" y="450" width="560" height="230" rx="10" fill="#f6f8fa" stroke="#9fb4c4" stroke-width="1.4"/>
  <text x="960" y="478" text-anchor="middle" class="boxtitle">Why trust it</text>
  <line x1="696" y1="490" x2="1224" y2="490" stroke="#dde4ec"/>

  <text x="700" y="514" class="small">&bull; modules validated against published benchmarks</text>
  <text x="700" y="529" class="small">&nbsp;&nbsp;(Fredlund-Krahn, ACADS, Griffiths-Lane, Prandtl, Duncan&hellip;)</text>
  <text x="700" y="552" class="small">&bull; ~7,900 automated tests, CI-gated on every change</text>
  <text x="700" y="575" class="small">&bull; tools expose allowed values — the agent cannot invent</text>
  <text x="700" y="590" class="small">&nbsp;&nbsp;methods or parameters</text>
  <text x="700" y="613" class="small">&bull; probabilistic answers (&beta;, p&#8341;) built on published,</text>
  <text x="700" y="628" class="small">&nbsp;&nbsp;cited property variability data</text>

  <text x="975" y="514" class="small">&bull; answers carry section / table / equation</text>
  <text x="975" y="529" class="small">&nbsp;&nbsp;citations into the design manuals</text>
  <text x="975" y="552" class="small">&bull; independent review pass before answers land</text>
  <text x="975" y="575" class="small">&bull; every analysis ships as an engineer-checkable</text>
  <text x="975" y="590" class="small">&nbsp;&nbsp;calc package — nothing is a black box</text>
  <text x="975" y="613" class="small">&bull; reference data QC'd against source PDFs on</text>
  <text x="975" y="628" class="small">&nbsp;&nbsp;a recurring schedule</text>

  <!-- footer -->
  <text x="40" y="706" class="small">geotech-staff-engineer 5.1 &middot; Python, open architecture &middot; same modules drive chat, notebooks, and Foundry</text>
</svg>
</div>
</body>
</html>
