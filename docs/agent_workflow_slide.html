<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>GeotechStaffEngineer — Agent Workflow</title>
<style>
  body { margin:0; background:#222; display:flex; justify-content:center; align-items:center; min-height:100vh; }
  .slide { width:1280px; height:720px; background:#fcfdfe; font-family:"Segoe UI",system-ui,sans-serif; position:relative; overflow:hidden; box-shadow:0 4px 30px rgba(0,0,0,.5); }
  svg { position:absolute; inset:0; }
  text { font-family:"Segoe UI",system-ui,sans-serif; }
  .title { font-size:25px; font-weight:700; fill:#16324a; }
  .subtitle { font-size:13.5px; fill:#5d6b7a; }
  .boxtitle { font-size:15px; font-weight:700; fill:#16324a; }
  .boxsub { font-size:11.5px; fill:#48586a; }
  .small { font-size:10.5px; fill:#5d6b7a; }
  .tooltxt { font-size:11.5px; font-weight:600; fill:#0e5e7e; }
  .modtxt { font-size:10px; fill:#3d4c5c; }
  .lbl { font-size:10.5px; font-weight:600; fill:#7a4a00; }
</style>
</head>
<body>
<div class="slide">
<svg viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#5d6b7a"/>
    </marker>
    <marker id="arrB" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#0e6e8e"/>
    </marker>
    <marker id="arrG" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#1a7f4b"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="40" y="44" class="title">GeotechStaffEngineer — LLM agent workflow</text>
  <text x="40" y="66" class="subtitle">One orchestrating agent &middot; four discovery/execution tools &middot; 30 validated analysis modules &middot; three specialized sub-agents</text>

  <!-- ============ USER ============ -->
  <rect x="40" y="120" width="170" height="96" rx="10" fill="#eef6f9" stroke="#0e6e8e" stroke-width="2"/>
  <text x="125" y="150" text-anchor="middle" class="boxtitle">Engineer</text>
  <text x="125" y="170" text-anchor="middle" class="boxsub">chat / Databricks notebook</text>
  <text x="125" y="186" text-anchor="middle" class="boxsub">question &middot; DXF/PDF &middot; data files</text>
  <text x="125" y="202" text-anchor="middle" class="boxsub">confirmations on forms</text>

  <!-- ============ MAIN AGENT ============ -->
  <rect x="300" y="100" width="300" height="170" rx="12" fill="#ffffff" stroke="#16324a" stroke-width="2.5"/>
  <text x="450" y="128" text-anchor="middle" class="boxtitle">Main agent (deepagents loop)</text>
  <text x="450" y="147" text-anchor="middle" class="boxsub">frontier LLM via LangChain (Funhouse GPT / Claude)</text>
  <line x1="316" y1="158" x2="584" y2="158" stroke="#dde4ec"/>
  <text x="316" y="176" class="small">middleware: planning (to-dos) &middot; cross-session memory</text>
  <text x="316" y="192" class="small">conversation summarization &middot; per-tool result budgets</text>
  <text x="316" y="208" class="small">("search narrower" truncation nudges)</text>
  <text x="316" y="230" class="small" font-style="italic">discovers capability &rarr; plans &rarr; calls tools &rarr;</text>
  <text x="316" y="246" class="small" font-style="italic">delegates to sub-agents &rarr; assembles cited answer</text>

  <!-- user <-> agent arrows -->
  <line x1="210" y1="150" x2="296" y2="150" stroke="#5d6b7a" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="296" y1="190" x2="210" y2="190" stroke="#5d6b7a" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="253" y="142" text-anchor="middle" class="small">ask</text>
  <text x="253" y="206" text-anchor="middle" class="small">answer + calc package</text>

  <!-- ============ TOOLS ============ -->
  <rect x="300" y="305" width="300" height="120" rx="10" fill="#f1f6fa" stroke="#0e6e8e" stroke-width="1.8"/>
  <text x="450" y="330" text-anchor="middle" class="boxtitle" fill="#0e5e7e">Tools</text>
  <text x="316" y="352" class="tooltxt">list_agents</text>
  <text x="316" y="370" class="tooltxt">list_methods</text>
  <text x="460" y="352" class="tooltxt">describe_method</text>
  <text x="460" y="370" class="tooltxt">call_agent</text>
  <text x="316" y="392" class="small">catalog &rarr; method docs (allowed values) &rarr; validated run;</text>
  <text x="316" y="408" class="small">+ vision tools for reference figures &amp; plots</text>

  <line x1="450" y1="270" x2="450" y2="301" stroke="#0e6e8e" stroke-width="2" marker-end="url(#arrB)"/>

  <!-- ============ MODULES ============ -->
  <rect x="300" y="465" width="300" height="200" rx="10" fill="#ffffff" stroke="#9fb4c4" stroke-width="1.6"/>
  <text x="450" y="490" text-anchor="middle" class="boxtitle">30 validated analysis modules</text>
  <text x="316" y="512" class="modtxt">bearing capacity &middot; settlement &middot; axial pile &middot; drilled shaft</text>
  <text x="316" y="527" class="modtxt">lateral pile &middot; pile group &middot; wave equation &middot; downdrag</text>
  <text x="316" y="542" class="modtxt">sheet pile &middot; SOE &middot; retaining walls/MSE &middot; ground improvement</text>
  <text x="316" y="557" class="modtxt"><tspan font-weight="700">slope stability (GLE/M-P)</tspan> &middot; <tspan font-weight="700">FEM 2D (T6, strength reduction)</tspan></text>
  <text x="316" y="572" class="modtxt"><tspan font-weight="700">reliability (FOSM &middot; PEM &middot; Monte Carlo &middot; FORM)</tspan> &middot; seismic</text>
  <text x="316" y="587" class="modtxt">liquefaction &middot; site response &middot; subsurface characterization</text>
  <text x="316" y="602" class="modtxt">geostatistics &middot; sensitivity &middot; DXF/PDF import &middot; &hellip;</text>
  <line x1="316" y1="615" x2="584" y2="615" stroke="#dde4ec"/>
  <text x="316" y="634" class="small">every result renders to an engineer-reviewable</text>
  <text x="316" y="649" class="small"><tspan font-weight="700">calc package</tspan> (HTML/PDF: equations, tables, figures)</text>

  <line x1="450" y1="425" x2="450" y2="461" stroke="#0e6e8e" stroke-width="2" marker-end="url(#arrB)"/>

  <!-- ============ SUBAGENT: REFERENCES ============ -->
  <rect x="680" y="100" width="260" height="130" rx="10" fill="#f3f9f4" stroke="#1a7f4b" stroke-width="2"/>
  <text x="810" y="126" text-anchor="middle" class="boxtitle" fill="#155c39">References sub-agent</text>
  <text x="696" y="148" class="small">searches 20 ingested design manuals</text>
  <text x="696" y="163" class="small">(DM7, GEC 4&ndash;14, UFC, micropile&hellip;) via</text>
  <text x="696" y="178" class="small">full-text index + synonym expansion;</text>
  <text x="696" y="193" class="small">reads figures/tables; returns <tspan font-weight="700">cited</tspan> passages</text>
  <text x="696" y="214" class="lbl" fill="#155c39">budgeted: hard cap on internal rounds</text>

  <!-- ============ SUBAGENT: REVIEWER (highlighted) ============ -->
  <rect x="680" y="255" width="260" height="150" rx="10" fill="#fff8ee" stroke="#a05a00" stroke-width="2.6"/>
  <text x="810" y="281" text-anchor="middle" class="boxtitle" fill="#7a4a00">Reviewer sub-agent</text>
  <text x="696" y="303" class="small">independent QC pass on the draft answer:</text>
  <text x="696" y="319" class="small">&bull; re-checks numbers against tool outputs</text>
  <text x="696" y="335" class="small">&bull; verifies citations point where claimed</text>
  <text x="696" y="351" class="small">&bull; flags unit errors &amp; unsupported claims</text>
  <text x="696" y="367" class="small">&bull; challenges method applicability</text>
  <text x="696" y="390" class="lbl">fresh context — reviews, never authors</text>

  <!-- ============ SUBAGENT: SETUP ============ -->
  <rect x="680" y="430" width="260" height="165" rx="10" fill="#f4f3fa" stroke="#5b4ea0" stroke-width="2"/>
  <text x="810" y="456" text-anchor="middle" class="boxtitle" fill="#473c85">Model-setup sub-agent</text>
  <text x="696" y="478" class="small">builds LE/FEM models in <tspan font-weight="700">stages with</tspan></text>
  <text x="696" y="493" class="small"><tspan font-weight="700">human confirmation gates</tspan>:</text>
  <text x="696" y="510" class="small">geometry &rarr; materials &rarr; water &rarr; run</text>
  <text x="696" y="528" class="small">&bull; DXF/PDF ingest, asks user to map layers</text>
  <text x="696" y="544" class="small">&bull; echoes back a rendered cross-section</text>
  <text x="696" y="560" class="small">&bull; cited property defaults, assumption ledger</text>
  <text x="696" y="582" class="lbl" fill="#473c85">run REFUSED until every stage confirmed</text>

  <!-- agent <-> subagent arrows -->
  <line x1="600" y1="160" x2="676" y2="160" stroke="#1a7f4b" stroke-width="2" marker-end="url(#arrG)"/>
  <line x1="604" y1="225" x2="676" y2="300" stroke="#a05a00" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="600" y1="250" x2="676" y2="480" stroke="#5b4ea0" stroke-width="2" marker-end="url(#arr)"/>

  <!-- setup loop back to user -->
  <path d="M 810 598 L 810 688 L 125 688 L 125 224" fill="none" stroke="#5b4ea0" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arr)"/>
  <text x="467" y="681" text-anchor="middle" class="small" fill="#473c85" font-weight="600">confirmation forms &amp; rendered cross-sections back to the engineer at every stage</text>

  <!-- knowledge base note under references -->
  <rect x="985" y="100" width="255" height="130" rx="10" fill="#ffffff" stroke="#9fb4c4" stroke-width="1.4"/>
  <text x="1112" y="126" text-anchor="middle" class="boxtitle">Reference library</text>
  <text x="1000" y="148" class="small">20 manuals &middot; 1,900 indexed sections</text>
  <text x="1000" y="164" class="small">figure catalogs &middot; lookup functions</text>
  <text x="1000" y="180" class="small">weekend QC vs source PDFs</text>
  <text x="1000" y="196" class="small">query expansion: +33 pts recall</text>
  <line x1="940" y1="165" x2="981" y2="165" stroke="#1a7f4b" stroke-width="1.8" marker-end="url(#arrG)"/>

  <!-- guardrails column -->
  <rect x="985" y="255" width="255" height="340" rx="10" fill="#f6f8fa" stroke="#9fb4c4" stroke-width="1.4"/>
  <text x="1112" y="281" text-anchor="middle" class="boxtitle">Why trust it</text>
  <text x="1000" y="305" class="small">&bull; modules validated vs published</text>
  <text x="1000" y="320" class="small">&nbsp;&nbsp;benchmarks (Fredlund-Krahn, ACADS,</text>
  <text x="1000" y="335" class="small">&nbsp;&nbsp;Griffiths-Lane, Prandtl, Duncan&hellip;)</text>
  <text x="1000" y="356" class="small">&bull; ~7,900 automated tests, CI-gated</text>
  <text x="1000" y="377" class="small">&bull; tools expose allowed values; agent</text>
  <text x="1000" y="392" class="small">&nbsp;&nbsp;can't invent methods or parameters</text>
  <text x="1000" y="413" class="small">&bull; answers carry section/equation</text>
  <text x="1000" y="428" class="small">&nbsp;&nbsp;citations into the manuals</text>
  <text x="1000" y="449" class="small">&bull; independent reviewer pass</text>
  <text x="1000" y="470" class="small">&bull; humans confirm geometry visually;</text>
  <text x="1000" y="485" class="small">&nbsp;&nbsp;vision-read geometry is quarantined</text>
  <text x="1000" y="506" class="small">&bull; every analysis ships as a checkable</text>
  <text x="1000" y="521" class="small">&nbsp;&nbsp;calc package</text>
  <text x="1000" y="542" class="small">&bull; probabilistic answers (&beta;, p&#8341;) with</text>
  <text x="1000" y="557" class="small">&nbsp;&nbsp;published, cited property COVs</text>

  <!-- footer -->
  <text x="40" y="710" class="small">geotech-staff-engineer 5.1 &middot; Python, open architecture &middot; same modules drive chat, notebooks, and Foundry</text>
</svg>
</div>
</body>
</html>
